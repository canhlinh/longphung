name: Docker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Ephemeral Postgres on the runner — only used during image build, not in production.
  CI_DATABASE_URL: postgres://postgres:postgres@localhost:5432/long_phung
  CI_PAYLOAD_SECRET: ci-build-secret

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: long_phung
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Prepare database schema
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          PAYLOAD_SECRET: ${{ env.CI_PAYLOAD_SECRET }}
        run: |
          npm ci
          npx cross-env NODE_OPTIONS=--no-deprecation payload migrate

      - name: Resolve build-time site URL
        id: site
        run: |
          if [ -z "${{ vars.NEXT_PUBLIC_SITE_URL }}" ]; then
            echo "::error::Set NEXT_PUBLIC_SITE_URL in repo Variables (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi
          echo "url=${{ vars.NEXT_PUBLIC_SITE_URL }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use host Docker daemon so the build can reach localhost:5432 (job Postgres).
          driver: docker

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          network: host
          build-args: |
            DATABASE_URL=${{ env.CI_DATABASE_URL }}
            PAYLOAD_SECRET=${{ env.CI_PAYLOAD_SECRET }}
            NEXT_PUBLIC_SITE_URL=${{ steps.site.outputs.url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max