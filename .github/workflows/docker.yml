name: Docker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build-time site URL
        id: site
        run: |
          if [ -z "${{ vars.NEXT_PUBLIC_SITE_URL }}" ]; then
            echo "::error::Set NEXT_PUBLIC_SITE_URL in repo Variables (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi
          echo "url=${{ vars.NEXT_PUBLIC_SITE_URL }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PAYLOAD_SECRET=ci-build-secret
            NEXT_PUBLIC_SITE_URL=${{ steps.site.outputs.url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max